<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sân bay - Admin Portal</title>
    <link rel="stylesheet" href="../../css/admin/uc23_quanLySanBay.css">
    <link rel="stylesheet" href="../../css/admin/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
<div class="admin-wrapper">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
        <div id="header-container"></div>

<main class="container">
    <div class="page-header">
        <h1 class="page-title">Quản lý sân bay</h1>
        <button class="btn btn-primary" onclick="openForm('add')">
            <i class="fa-solid fa-plus"></i> Thêm sân bay mới
        </button>
    </div>

    <div id="alert-message" class="alert" style="display: none;"></div>

    <section id="airport-list-section" class="step-section active">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Mã sân bay</th>
                        <th>Tên sân bay</th>
                        <th>Thành phố</th>
                        <th>Quốc gia</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="airport-table-body">
                    <!-- Dữ liệu render từ JS -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- Modal Thêm/Sửa -->
    <div id="airport-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Thêm sân bay mới</h2>
                <span class="close-btn" onclick="closeForm()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="airport-form">
                    <input type="hidden" id="original-airport-id">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Mã sân bay (IATA) <span class="text-danger">*</span></label>
                            <input type="text" id="airport-id" required placeholder="Ví dụ: SGN" maxlength="3" oninput="this.value = this.value.toUpperCase()">
                        </div>
                        <div class="input-group">
                            <label>Tên sân bay <span class="text-danger">*</span></label>
                            <input type="text" id="airport-name" required placeholder="Ví dụ: Tân Sơn Nhất">
                        </div>
                    </div>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label>Thành phố <span class="text-danger">*</span></label>
                            <input type="text" id="city" required placeholder="Ví dụ: Hồ Chí Minh">
                        </div>
                        <div class="input-group">
                            <label>Quốc gia <span class="text-danger">*</span></label>
                            <input type="text" id="country" required placeholder="Ví dụ: Việt Nam">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Trạng thái hoạt động</label>
                        <select id="status">
                            <option value="active">Đang hoạt động</option>
                            <option value="inactive">Ngừng hoạt động</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeForm()">Hủy bỏ</button>
                <button class="btn btn-primary" onclick="saveAirport()">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Modal Xác nhận xóa -->
    <div id="delete-modal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>Xác nhận xóa</h2>
                <span class="close-btn" onclick="closeDeleteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xóa sân bay <strong id="delete-airport-code" class="text-primary"></strong>?</p>
                <p class="small-text text-danger mt-2">
                    <i class="fa-solid fa-triangle-exclamation"></i> 
                    Lưu ý: Nếu sân bay đang thuộc tuyến bay hoặc chuyến bay đang hoạt động, hệ thống sẽ từ chối xóa.
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Hủy</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Xác nhận xóa</button>
            </div>
        </div>
    </div>
</main>
    </div>
</div>

<script src="../../js/admin/layout.js"></script>
<script src="../../js/admin/uc23_quanLySanBay.js"></script>
</body>
</html>
