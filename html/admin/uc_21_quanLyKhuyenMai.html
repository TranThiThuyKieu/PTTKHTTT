<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khuyến mãi</title>
    <link rel="stylesheet" href="../../css/admin/layout.css">
    <link rel="stylesheet" href="../../css/vourcher/quanLyKhuyenMai.css">
    <link rel="stylesheet" href="../../css/vourcher/adminSidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="admin-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-wrapper">
            <div id="header-container"></div>

            <main class="container">
                <div class="admin-layout">
                    <div class="page-shell">
                        <header class="topbar">
                            <div>
                                <p class="eyebrow">Hệ thống đặt vé máy bay</p>
                                <h1>Quản lý khuyến mãi</h1>
                            </div>
                            <button id="openModalBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Tạo
                                khuyến
                                mãi</button>
                        </header>

                        <main class="dashboard">
                            <section class="tab-panel active">
                                <section class="stats-grid">
                                    <article class="stat-card">
                                        <div>
                                            <p class="stat-label">Tổng khuyến mãi</p>
                                            <h3 id="totalPromotions">0</h3>
                                        </div>
                                        <i class="fa-solid fa-tags"></i>
                                    </article>
                                    <article class="stat-card">
                                        <div>
                                            <p class="stat-label">Đang hoạt động</p>
                                            <h3 id="activePromotions">0</h3>
                                        </div>
                                        <i class="fa-solid fa-circle-check"></i>
                                    </article>
                                    <article class="stat-card">
                                        <div>
                                            <p class="stat-label">Sắp diễn ra</p>
                                            <h3 id="upcomingPromotions">0</h3>
                                        </div>
                                        <i class="fa-solid fa-clock"></i>
                                    </article>
                                    <article class="stat-card">
                                        <div>
                                            <p class="stat-label">Đã kết thúc</p>
                                            <h3 id="endedPromotions">0</h3>
                                        </div>
                                        <i class="fa-solid fa-calendar-xmark"></i>
                                    </article>
                                </section>

                                <section class="content-card">
                                    <div class="toolbar">
                                        <div class="search-box">
                                            <i class="fa-solid fa-magnifying-glass"></i>
                                            <input id="searchInput" type="text"
                                                placeholder="Tìm theo mã hoặc tên khuyến mãi">
                                        </div>
                                        <select id="statusFilter">
                                            <option value="all">Tất cả trạng thái</option>
                                            <option value="Đang hoạt động">Đang hoạt động</option>
                                            <option value="Sắp diễn ra">Sắp diễn ra</option>
                                            <option value="Đã kết thúc">Đã kết thúc</option>
                                            <option value="Tạm dừng">Tạm dừng</option>
                                        </select>
                                        <button id="resetFiltersBtn" class="btn btn-secondary">Đặt lại</button>
                                    </div>

                                    <div class="table-wrapper">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Mã</th>
                                                    <th>Tên khuyến mãi</th>
                                                    <th>Loại</th>
                                                    <th>Giá trị</th>
                                                    <th>Thời gian</th>
                                                    <th>Trạng thái</th>
                                                    <th>Hành động</th>
                                                </tr>
                                            </thead>
                                            <tbody id="promotionTableBody"></tbody>
                                        </table>
                                    </div>
                                </section>
                            </section>

                        </main>
                    </div>
                </div>

                <div id="promotionModal" class="modal hidden">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 id="modalTitle">Tạo khuyến mãi</h2>
                            <button id="closeModalBtn" class="icon-btn" type="button"><i
                                    class="fa-solid fa-xmark"></i></button>
                        </div>

                        <form id="promotionForm" class="promo-form">
                            <input type="hidden" id="promotionId">
                            <div class="form-grid">
                                <label>
                                    <span>Tên khuyến mãi</span>
                                    <input type="text" id="name" required>
                                </label>
                                <label>
                                    <span>Mã khuyến mãi</span>
                                    <input type="text" id="code" required>
                                </label>
                                <label>
                                    <span>Loại</span>
                                    <select id="type" required>
                                        <option value="Giảm phần trăm">Giảm phần trăm</option>
                                        <option value="Giảm tiền">Giảm tiền</option>
                                        <option value="Miễn phí hành lý">Miễn phí hành lý</option>
                                    </select>
                                </label>
                                <label>
                                    <span>Giá trị</span>
                                    <input type="number" id="value" min="1" required>
                                </label>
                                <label>
                                    <span>Ngày bắt đầu</span>
                                    <input type="date" id="startDate" required>
                                </label>
                                <label>
                                    <span>Ngày kết thúc</span>
                                    <input type="date" id="endDate" required>
                                </label>
                                <label>
                                    <span>Đối tượng áp dụng</span>
                                    <input type="text" id="target" placeholder="Ví dụ: khách hàng mới" required>
                                </label>
                                <label>
                                    <span>Trạng thái</span>
                                    <select id="status" required>
                                        <option value="Đang hoạt động">Đang hoạt động</option>
                                        <option value="Sắp diễn ra">Sắp diễn ra</option>
                                        <option value="Đã kết thúc">Đã kết thúc</option>
                                        <option value="Tạm dừng">Tạm dừng</option>
                                    </select>
                                </label>
                            </div>

                            <div class="form-actions">
                                <button type="button" id="cancelBtn" class="btn btn-secondary">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu khuyến mãi</button>
                            </div>
                        </form>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="../../js/admin/layout.js"></script>
    <script src="../../js/vourcher/quanLyKhuyenMai.js"></script>
</body>

</html>
