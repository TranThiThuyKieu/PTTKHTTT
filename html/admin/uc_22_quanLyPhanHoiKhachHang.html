<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phản hồi khách hàng</title>
    <link rel="stylesheet" href="../../css/vourcher/adminSidebar.css">
    <link rel="stylesheet" href="../../css/admin/layout.css">
    <link rel="stylesheet" href="../../css/vourcher/quanLyPhanHoiKhachHang.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="admin-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-wrapper">
            <div id="header-container"></div>

            <main class="container">
                <div class="page-shell">
                    <header class="topbar">
                        <div>
                            <p class="eyebrow">Hệ thống đặt vé máy bay</p>
                            <h1>Quản lý phản hồi khách hàng</h1>
                        </div>
                    </header>

                    <main class="dashboard">
                        <section class="stats-grid">
                            <article class="stat-card">
                                <div>
                                    <p class="stat-label">Tổng phản hồi</p>
                                    <h3 id="totalFeedback">0</h3>
                                </div>
                                <i class="fa-solid fa-message"></i>
                            </article>
                            <article class="stat-card">
                                <div>
                                    <p class="stat-label">Chờ xử lý</p>
                                    <h3 id="pendingFeedback">0</h3>
                                </div>
                                <i class="fa-solid fa-hourglass-half"></i>
                            </article>
                            <article class="stat-card">
                                <div>
                                    <p class="stat-label">Đang phản hồi</p>
                                    <h3 id="replyingFeedback">0</h3>
                                </div>
                                <i class="fa-solid fa-paper-plane"></i>
                            </article>
                            <article class="stat-card">
                                <div>
                                    <p class="stat-label">Đã đóng</p>
                                    <h3 id="closedFeedback">0</h3>
                                </div>
                                <i class="fa-solid fa-circle-check"></i>
                            </article>
                        </section>

                        <section class="content-card">
                            <div class="toolbar">
                                <div class="search-box">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input id="feedbackSearch" type="text"
                                        placeholder="Tìm theo tên khách hàng hoặc nội dung">
                                </div>
                                <select id="priorityFilter">
                                    <option value="all">Tất cả mức độ</option>
                                    <option value="Cao">Cao</option>
                                    <option value="Trung bình">Trung bình</option>
                                    <option value="Thấp">Thấp</option>
                                </select>
                                <button id="resetFilterBtn" class="btn btn-secondary">Đặt lại</button>
                            </div>

                            <div class="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Mã</th>
                                            <th>Khách hàng</th>
                                            <th>Nội dung</th>
                                            <th>Loại</th>
                                            <th>Ưu tiên</th>
                                            <th>Trạng thái</th>
                                            <th>Hành động</th>
                                        </tr>
                                    </thead>
                                    <tbody id="feedbackTableBody"></tbody>
                                </table>
                            </div>
                        </section>
                    </main>
                </div>

            </main>
        </div>
    </div>


    <script src="../../js/vourcher/quanLyPhanHoiKhachHang.js"></script>
    <script src="../../js/admin/layout.js"></script>

</body>

</html>
