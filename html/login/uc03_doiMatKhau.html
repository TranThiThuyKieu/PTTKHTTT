<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="/css/uc03_doiMatKhau.css">
</head>
<body>
<div class="main-container">
    <div class="image-sidebar">
        <h1>Bảo vệ tài khoản của bạn</h1>
        <p>
            Thay đổi mật khẩu định kỳ giúp nâng cao tính bảo mật và bảo vệ
            tài khoản của bạn khỏi các truy cập trái phép.
        </p>
    </div>
    <div class="form-container">
        <div class="form-header">
            <h2>Đổi mật khẩu</h2>
            <p>Vui lòng nhập đầy đủ các thông tin dưới đây để cập nhật mật khẩu mới.</p>
        </div>
        <div class="alert alert-error" id="error-message"></div>
        <div class="alert alert-success" id="success-message"></div>
        <form id="change-password-form" onsubmit="handleChangePassword(event)">
            <div class="input-group">
                <label for="current-password">Mật khẩu hiện tại</label>
                <input type="password" id="current-password" placeholder="Nhập mật khẩu hiện tại" required>
            </div>
            <div class="input-group">
                <label for="new-password">Mật khẩu mới</label>
                <input type="password" id="new-password" placeholder="Tối thiểu 8 ký tự, bao gồm chữ hoa và số" required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu mới</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới" required>
            </div>
            <button type="submit" class="btn-submit">Cập nhật mật khẩu</button>
            <div class="btn-group-sub">
                <button type="button" class="btn-sub btn-cancel" onclick="handleExit()">
                    Thoát
                </button>
            </div>
        </form>
    </div>
</div>
<script src="/js/uc03_doiMatKhau.js"></script>
</body>
</html>
