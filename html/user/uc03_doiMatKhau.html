<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Flight Booking</title>
    <link rel="stylesheet" href="../../css/user/header.css">
    <link rel="stylesheet" href="../../css/user/footer.css">
    <link rel="stylesheet" href="../../css/user/uc03_doiMatKhau.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div id="header"></div>
    <main class="main-content">
        <div class="container">
            <div class="form-container">
                <div class="page-header">
                    <h1>Đổi mật khẩu</h1>
                    <p>Cập nhật mật khẩu mới để bảo vệ tài khoản của bạn.</p>
                </div>
                
                <div id="alert-message" class="alert hidden"></div>

                <form id="change-password-form">
                    <div class="form-group">
                        <label for="current-password">Mật khẩu hiện tại <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="current-password" placeholder="Nhập mật khẩu hiện tại" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('current-password')"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password">Mật khẩu mới <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="new-password" placeholder="Nhập mật khẩu mới" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('new-password')"></i>
                        </div>
                        <small class="help-text">Mật khẩu phải từ 8 ký tự, chứa ít nhất 1 chữ hoa và 1 chữ số.</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Xác nhận mật khẩu mới <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('confirm-password')"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="cancelChange()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Cập nhật</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="../../js/user/header.js"></script>
    <script src="../../js/user/uc03_doiMatKhau.js"></script>
</body>
</html>
